# XDB Configuration
# The actual config file is JSON at ~/.xdb/config.json
# This YAML file documents all available settings and their defaults.

# Base directory for XDB data, logs, PID file, and socket
# Default: ~/.xdb
dir: "~/.xdb"

# Daemon configuration
daemon:
  # TCP address for the daemon to listen on
  # Default: localhost:8147
  addr: "localhost:8147"

  # Unix socket filename (created inside dir)
  # Default: xdb.sock
  socket: "xdb.sock"

# Log level
# Options: debug, info, warn, error
# Default: info
log_level: "info"

# Store backend configuration
store:
  # Backend type
  # Options: "memory", "sqlite", "redis", "fs"
  # Default: memory (used when store section is omitted)
  backend: "sqlite"

  # SQLite-specific configuration (only used when backend is "sqlite")
  sqlite:
    # Directory for the SQLite database file
    # Default: <dir>/data (e.g., ~/.xdb/data)
    dir: ""

    # Database filename
    # Default: xdb.db
    name: "xdb.db"

    # Use an in-memory SQLite database (data does not persist)
    # Default: false
    in_memory: false

  # Redis-specific configuration (only used when backend is "redis")
  redis:
    # Redis server address (required)
    addr: "localhost:6379"

    # Redis password (optional)
    password: ""

    # Redis database number
    # Default: 0
    db: 0

  # Filesystem-specific configuration (only used when backend is "fs")
  fs:
    # Directory for storing data files
    # Default: <dir>/data (e.g., ~/.xdb/data)
    dir: ""

# Example JSON configs (what ~/.xdb/config.json looks like):
#
# SQLite backend:
# {
#   "dir": "~/.xdb",
#   "daemon": { "addr": "localhost:8147", "socket": "xdb.sock" },
#   "log_level": "info",
#   "store": {
#     "backend": "sqlite",
#     "sqlite": { "name": "xdb.db" }
#   }
# }
#
# Redis backend:
# {
#   "store": {
#     "backend": "redis",
#     "redis": { "addr": "localhost:6379" }
#   }
# }
#
# Filesystem backend:
# {
#   "store": {
#     "backend": "fs"
#   }
# }
